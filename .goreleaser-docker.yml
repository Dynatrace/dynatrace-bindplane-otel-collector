version: 2

project_name: dbdot-collector

before:
  hooks:
    - make release-prep CURR_VERSION={{ .Version }}

# https://goreleaser.com/customization/build/
# https://goreleaser.com/customization/builds/#import-pre-built-binaries
builds:
  - id: collector
    builder: prebuilt
    binary: dbdot-collector
    goos:
      - linux
    goarch:
      - amd64
      - arm64
      - ppc64le
    prebuilt:
      path: tmp/collector_{{ .Os }}_{{ .Arch }}

# Build container images with docker buildx (mutli arch builds).
dockers:
  - id: scratch-amd64
    goos: linux
    goarch: amd64
    retry:
      attempts: 10
      delay: 30s
      max_delay: 1m
    ids:
      - collector
    image_templates:
      - "TODO-DBDOT-DOCKERHUB-ORG/bindplane-agent-amd64:{{ .Version }}-minimal"
      - "ghcr.io/TODO-DBDOT-GHCR-ORG/bindplane-agent-amd64:{{ .Version }}-minimal"
      - "us-central1-docker.pkg.dev/TODO-DBDOT-GCP-PROJECT/agent/bindplane-agent-amd64:{{ .Version }}-minimal"
    dockerfile: ./docker/Dockerfile.scratch
    use: buildx
    build_flag_templates:
      - "--label=created={{.Date}}"
      - "--label=title={{.ProjectName}}"
      - "--label=revision={{.FullCommit}}"
      - "--label=version={{.Version}}"
      - "--platform=linux/amd64"
    extra_files:
      - release_deps/VERSION.txt
      - release_deps/plugins
      - release_deps/config.yaml
      - config/logging.stdout.yaml
      - LICENSE
  - id: scratch-arm64
