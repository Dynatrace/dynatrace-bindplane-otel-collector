      - "us-central1-docker.pkg.dev/TODO-DBDOT-GCP-PROJECT/collector/dbdot-collector-ppc64le:latest"
      - "us-central1-docker.pkg.dev/TODO-DBDOT-GCP-PROJECT/collector/dbdot-collector-ppc64le:{{ .Version }}"
      # Bindplane Agent Containers
    dockerfile: ./docker/Dockerfile.ubuntu
    use: buildx
    build_flag_templates:
      - "--label=created={{.Date}}"
      - "--label=title={{.ProjectName}}"
      - "--label=revision={{.FullCommit}}"
      - "--label=version={{.Version}}"
      - "--platform=linux/ppc64le"
    extra_files:
      - release_deps/VERSION.txt
