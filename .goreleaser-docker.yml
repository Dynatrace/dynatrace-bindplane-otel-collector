      - "ghcr.io/dynatrace/dbdot-collector-arm64:{{ .Version }}-jmx"
      - "us-central1-docker.pkg.dev/TODO-DBDOT-GCP-PROJECT/collector/dbdot-collector-arm64:{{ .Version }}-jmx"
      # Bindplane Agent Containers
    dockerfile: ./docker/Dockerfile.jmx
    use: buildx
    build_flag_templates:
      - "--label=created={{.Date}}"
      - "--label=title={{.ProjectName}}"
      - "--label=revision={{.FullCommit}}"
      - "--label=version={{.Version}}"
      - "--platform=linux/arm64"
    extra_files:
      - release_deps/VERSION.txt
