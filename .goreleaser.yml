version: 2

project_name: dbdot-collector

before:
  hooks:
    - make release-prep-gpg CURR_VERSION={{ .Version }}
    # Build collector + updater binaries via ocb-driven `make`. Goreleaser
    # picks them up below via `builder: prebuilt`.
    - make build-all-non-aix OUTDIR="tmp"

after:
  hooks:
    - cmd: rm -rf tmp

# https://goreleaser.com/customization/build/
#
# `ldflags`, `tags`, and `main` are no longer set here — the Make targets own
# them (`AGENT_LDFLAGS` / `UPDATER_LDFLAGS` + `-tags $(AGENT_BUILD_TAGS)`,
# i.e. `bindplane embed_library`). Goreleaser only packages the pre-built
# binaries.
builds:
  - id: collector
    builder: prebuilt
    binary: dbdot-collector
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
      - arm
      - ppc64
      - ppc64le
    ignore:
      - goos: darwin
        goarch: ppc64
      - goos: darwin
        goarch: ppc64le
      - goos: windows
        goarch: arm
      - goos: windows
        goarch: ppc64
      - goos: windows
        goarch: ppc64le
    prebuilt:
      path: tmp/collector_{{ .Os }}_{{ .Arch }}{{ .Ext }}
  - id: updater
    builder: prebuilt
    binary: updater
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
      - arm
      - ppc64
      - ppc64le
    ignore:
      - goos: darwin
        goarch: ppc64
      - goos: darwin
        goarch: ppc64le
      - goos: windows
        goarch: arm
      - goos: windows
        goarch: ppc64
      - goos: windows
        goarch: ppc64le
    prebuilt:
      path: tmp/updater_{{ .Os }}_{{ .Arch }}{{ .Ext }}

# https://goreleaser.com/customization/archive/
archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "{{ .ProjectName }}-v{{ .Version }}-{{ .Os }}-{{ .Arch }}"
    files:
      - LICENSE
      - src: release_deps/config.yaml
        dst: "."
        strip_parent: true
      - src: release_deps/logging.yaml
        dst: "."
        strip_parent: true
      - src: release_deps/plugins/*
        dst: plugins
        strip_parent: true
      - src: release_deps/VERSION.txt
        dst: "."
        strip_parent: true
      - src: release_deps/com.dynatrace.dbdot.collector.plist
        dst: "install"
        strip_parent: true
      - src: release_deps/gpg-keys.tar.gz
        dst: "."
        strip_parent: true
      - src: release_deps/windows_service.json
        dst: install
        strip_parent: true

nfpms:
  - id: collector
    ids:
      - collector
      - updater
    file_name_template: "{{ .PackageName }}_v{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    package_name: dbdot-collector
    vendor: TODO-DBDOT-VENDOR
    maintainer: TODO-DBDOT-VENDOR <TODO-DBDOT-SUPPORT-EMAIL>
    description: Dynatrace Bindplane Distribution of OpenTelemetry Collector
    homepage: https://github.com/dynatrace/dynatrace-bindplane-otel-collector
    license: Apache 2.0
    formats:
      - rpm
      - deb
    bindir: /usr/share/dbdot-collector/stage/dbdot-collector
    deb:
      signature:
        key_file: "{{ .Env.SIGNING_KEY_FILE }}"
    rpm:
      signature:
        key_file: "{{ .Env.SIGNING_KEY_FILE }}"
    contents:
      - dst: /usr/share/dbdot-collector/stage/dbdot-collector
        type: dir
        file_info:
          mode: 0750
          owner: root
          group: root
      - src: release_deps/config.yaml
        dst: /usr/share/dbdot-collector/stage/dbdot-collector/config.yaml
        file_info:
          mode: 0640
          owner: root
          group: root
        type: config|noreplace
      - src: release_deps/logging.yaml
        dst: /usr/share/dbdot-collector/stage/dbdot-collector/logging.yaml
        file_info:
          mode: 0640
          owner: root
          group: root
        type: config|noreplace
      - src: LICENSE
        dst: /usr/share/dbdot-collector/stage/dbdot-collector/LICENSE
        file_info:
          mode: 0644
          owner: root
          group: root
      - src: release_deps/VERSION.txt
        dst: /usr/share/dbdot-collector/stage/dbdot-collector/VERSION.txt
        file_info:
          mode: 0644
          owner: root
          group: root
      - dst: /usr/share/dbdot-collector/stage/dbdot-collector/plugins
        type: dir
        file_info:
          mode: 0750 # restrict plugins to owner / group only
          owner: root
          group: root
      # Note: plugins owner/group/mode is set in the post-install script
      # Attempting to set the permissions here results in the following error:
      # nfpm failed: cannot write header of release_deps/plugins/amazon_eks.yaml to data.tar.gz: archive/tar: missed writing 1736 bytes
      - src: release_deps/plugins/*
        dst: /usr/share/dbdot-collector/stage/dbdot-collector/plugins
      # Storage dir is used by stateful receivers, such as file_log receiver. It allows
      # receivers to track their progress and buffer data.
      - dst: /usr/share/dbdot-collector/stage/dbdot-collector/storage
        type: dir
        file_info:
          mode: 0750
          owner: root
          group: root
      - dst: /usr/share/dbdot-collector/stage/dbdot-collector/log
        type: dir
        file_info:
          mode: 0750
          owner: root
          group: root
    scripts:
      preinstall: ./scripts/package/preinstall.sh
      postinstall: ./scripts/package/postinstall.sh
      preremove: ./scripts/package/preremove.sh
      postremove: ./scripts/package/postremove.sh

# https://goreleaser.com/customization/checksum/
checksum:
  name_template: "{{ .ProjectName }}-v{{ .Version }}-SHA256SUMS"
  algorithm: sha256
  extra_files:
    - glob: "./dbdot-collector*.msi"

# https://goreleaser.com/customization/sign/
signs:
  - cmd: cosign
    stdin: "{{ .Env.COSIGN_PWD }}"
    args:
      ["sign-blob", "--key=cosign.key", "--output=${signature}", "${artifact}"]
    artifacts: all

# https://goreleaser.com/customization/release/
release:
  draft: false

  # publish to a prerelease first
  prerelease: "true"
  extra_files:
    - glob: "./dbdot-collector*.msi"
    - glob: "./dbdot-collector*.msi.sig"
    - glob: "./scripts/install/install_unix.sh"
    - glob: "./scripts/install/install_macos.sh"
    - glob: "./scripts/install/install_windows.ps1"
    - glob: "./release_deps/gpg-keys.tar.gz"

# https://console.cloud.google.com/storage/browser/TODO-DBDOT-RELEASE-BUCKET
blobs:
  - provider: gs
    bucket: TODO-DBDOT-RELEASE-BUCKET
    directory: "v{{ .Version }}"
    extra_files:
      - glob: "./dbdot-collector*.msi"
      - glob: "./dbdot-collector*.msi.sig"
      - glob: "./scripts/install/install_unix.sh"
      - glob: "./scripts/install/install_macos.sh"
      - glob: "./scripts/install/install_windows.ps1"
      - glob: "./release_deps/gpg-keys.tar.gz"

# https://goreleaser.com/customization/changelog/
changelog:
  use: github
  sort: asc
  groups:
    - title: "New Features"
      regexp: "^.*feat[(\\w)]*:+.*$"
      order: 0
    - title: "Bug Fixes"
      regexp: "^.*fix[(\\w)]*:+.*$"
      order: 10
    - title: "Dependencies"
      regexp: "^.*deps[(\\w)]*:+.*$"
      order: 30
    - title: Other
      order: 999
